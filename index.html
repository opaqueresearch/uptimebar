<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UptimeBar</title>
    <script type="module" src="/src/popover.ts" defer></script>
  </head>
  <body class="popover">
    <header class="popover-header">
      <span id="summary" class="summary">Loading…</span>
      <div class="actions">
        <div class="segmented" id="filter-seg" role="group" aria-label="Filter">
          <button class="seg" data-filter="all" title="Show all monitors">All</button>
          <button class="seg" data-filter="problems" title="Show only down/degraded monitors">Problems</button>
        </div>
        <div class="segmented" id="group-seg" role="group" aria-label="Grouping">
          <button class="seg" data-group="status" title="Flat list, sorted by status">Flat</button>
          <button class="seg" data-group="provider" title="Group monitors by service">Grouped</button>
        </div>
        <button id="refresh" title="Refresh now" class="icon-btn">⟳</button>
        <button id="settings" title="Settings" class="icon-btn">⚙</button>
      </div>
    </header>
    <div id="notice" class="notice" hidden></div>
    <ul id="list" class="monitor-list"></ul>
    <div id="empty" class="empty" hidden>
      No monitors yet. Open <strong>Settings</strong> to add a provider.
    </div>
  </body>
</html>
